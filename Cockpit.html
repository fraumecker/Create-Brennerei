    <style>
      /* GitHub-Wrapper schneidet oben 80px ab, um den Google-Hinweis auszublenden.
         Dieser Ausgleich macht Überschrift und obere Buttons wieder sichtbar. */
      .main-frame {
        margin-top: 80px !important;
      }

      .cockpit-stack {
        display: grid;
        gap: 14px;
      }

      .cockpit-intro {
        color: #ffffff;
        font-weight: 800;
        line-height: 1.35;
        margin-bottom: 6px;
      }

      .cockpit-btn {
        width: 100%;
        min-height: 68px;
        font-size: 22px;
        font-weight: 900;
        border-radius: 18px;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }



      @keyframes zollPulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 4px rgba(55,142,255,0.18), 0 0 16px rgba(55,142,255,1); }
        50% { opacity: 0.55; box-shadow: 0 0 0 7px rgba(55,142,255,0.08), 0 0 24px rgba(55,142,255,1); }
      }

      .zoll-access-btn {
        position: relative;
        background: #10233f !important;
        color: #ffffff !important;
        border: 1px solid rgba(55, 142, 255, 0.55);
        box-shadow: 0 0 0 1px rgba(55,142,255,0.16), 12px 12px 24px rgba(0,0,0,0.22);
        padding-left: 52px;
      }

      .zoll-access-btn::before {
        content: "🚨";
        position: absolute;
        left: 18px;
        top: 50%;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
        filter: hue-rotate(175deg) saturate(1.8);
        animation: zollPulse 1.2s ease-in-out infinite;
      }

      .cockpit-info-card {
        display: grid;
        gap: 8px;
      }

      .cockpit-subline {
        color: var(--text-soft);
        font-size: 13px;
        line-height: 1.35;
      }

      @media (max-width: 768px) {
        .cockpit-btn {
          min-height: 60px;
          font-size: 18px;
        }
      }
    </style>
