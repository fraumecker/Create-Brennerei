    <script>
      const START_MODUS = '<?!= typeof startModus !== "undefined" ? startModus : "" ?>';
      const RETURN_MODUS = '<?!= typeof returnModus !== "undefined" ? returnModus : "" ?>';
      const ORIGIN_MODUS = '<?!= typeof originModus !== "undefined" ? originModus : "" ?>';
      const IST_ADMIN_RUECKSPRUNG = <?!= typeof istAdminRuecksprung !== "undefined" && istAdminRuecksprung ? 'true' : 'false' ?>;
      const WEBAPP_URL = '<?!= typeof webAppUrl !== "undefined" ? webAppUrl : "" ?>';
      const GITHUB_INDEX_URL = 'https://fraumecker.github.io/brennerei-startogv/';
      const GITHUB_ADMIN_URL = 'https://fraumecker.github.io/brennerei-startogv/admin.html';
      const IST_COCKPIT_RUECKSPRUNG = String(ORIGIN_MODUS || '').toLowerCase() === 'cockpit' || String(RETURN_MODUS || '').toLowerCase() === 'cockpit';
      let busy = false;
      let toastTimer = null;

      let stoffbesitzerListe = [];
      let maischeVorgaenge = [];
      let maischeBrennerListe = [];
      let maischeZollStatusListe = [];
      let maischeFassgroessenListe = [];
      let maischeMaterialListe = [];
      let maischeGewuerzeListe = [];
      let maischeSlotIndex = 0;
      let prozessModus = START_MODUS === 'brennfreigabe' ? 'brennfreigabe' : 'maischeannahme';

      function escapeHtml(text) {
        if (text == null) return '';
        return String(text).replace(/[&<>"']/g, function(m) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          }[m];
        });
      }

      function leseFehler(err) {
        return err && err.message ? err.message : String(err || 'Unbekannter Fehler');
      }

      function heuteIso() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + d;
      }

      function optionenHtml(liste, selectedValue, placeholder) {
        const selected = String(selectedValue || '').trim();
        let html = '<option value="">' + escapeHtml(placeholder || 'Bitte wählen') + '</option>';

        (liste || []).forEach(function(item) {
          const value = typeof item === 'string' ? item : String(item.value || '');
          const label = typeof item === 'string' ? item : String(item.label || item.value || '');
          if (!String(value || '').trim()) return;
          html += '<option value="' + escapeHtml(value) + '"' + (value === selected ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
        });

        return html;
      }

      function stoffbesitzerEintragWert(item) {
        return typeof item === 'string' ? item : String(item && item.value || '');
      }

      function stoffbesitzerEintragLabel(item) {
        return typeof item === 'string' ? item : String(item && (item.label || item.value) || '');
      }

      function stoffbesitzerVorschlaegeAktualisieren() {
        const eingabe = document.getElementById('stoffbesitzerSuche');
        const ziel = document.getElementById('stoffbesitzerVorschlaege');
        const hidden = document.getElementById('stoffbesitzer');
        if (!eingabe || !ziel || !hidden) return;

        const suchtext = String(eingabe.value || '').trim().toLowerCase();
        hidden.value = '';
        ziel.innerHTML = '';

        if (suchtext.length < 2) {
          ziel.classList.remove('open');
          return;
        }

        const treffer = (stoffbesitzerListe || []).filter(function(item) {
          const value = stoffbesitzerEintragWert(item);
          const label = stoffbesitzerEintragLabel(item);
          const suchbasis = String(value + ' ' + label).toLowerCase();
          return suchbasis.indexOf(suchtext) >= 0;
        }).slice(0, 20);

        if (!treffer.length) {
          ziel.innerHTML = '<div class="stoffbesitzer-hinweis">Kein passender Stoffbesitzer gefunden.</div>';
          ziel.classList.add('open');
          return;
        }

        treffer.forEach(function(item) {
          const value = stoffbesitzerEintragWert(item);
          const label = stoffbesitzerEintragLabel(item) || value;
          if (!String(value || '').trim()) return;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'stoffbesitzer-vorschlag';
          btn.textContent = label;
          btn.onclick = function() {
            hidden.value = value;
            eingabe.value = label;
            ziel.classList.remove('open');
            ziel.innerHTML = '';
          };
          ziel.appendChild(btn);
        });

        ziel.classList.add('open');
      }

      function checkboxGruppeHtml(liste, selectedValues, klasse, titel) {
        const selected = Array.isArray(selectedValues) ? selectedValues.map(function(v) { return String(v || '').trim(); }) : [];
        let optionen = '';
        (liste || []).forEach(function(item, i) {
          const value = typeof item === 'string' ? item : String(item.value || '');
          const label = typeof item === 'string' ? item : String(item.label || item.value || '');
          if (!String(value || '').trim()) return;
          const id = klasse + '_' + Math.random().toString(36).slice(2) + '_' + i;
          const checked = selected.indexOf(value) >= 0;
          optionen += '<label class="check-chip' + (checked ? ' selected' : '') + '" for="' + escapeHtml(id) + '" data-suchtext="' + escapeHtml((label + ' ' + value).toLowerCase()) + '">' +
            '<input id="' + escapeHtml(id) + '" type="checkbox" class="' + escapeHtml(klasse) + '" value="' + escapeHtml(value) + '"' + (checked ? ' checked' : '') + ' onchange="multiPickerGeaendert(this)">' +
            '<span>' + escapeHtml(label) + '</span></label>';
        });
        if (!optionen) optionen = '<div class="multi-picker-hint">Keine Werte geladen</div>';
        return '<div class="multi-picker-input-wrap"><input type="text" class="multi-picker-input" placeholder="' + escapeHtml((titel || 'Auswahl') + ' eintippen') + '" onfocus="multiPickerVorbereiten(this)" onclick="multiPickerVorbereiten(this)" oninput="multiPickerFilternAusInput(this)" autocomplete="off"></div>' +
          '<div class="multi-picker-panel"><div class="multi-picker-hint">Suchbegriff eintippen, dann Wert anklicken.</div><div class="multi-picker-options">' + optionen + '</div></div>';
      }

      function multiPickerVorbereiten(input) {
        if (busy) return;
        const picker = input.closest('.multi-picker');
        if (!picker) return;
        document.querySelectorAll('.multi-picker.open').forEach(function(offen) { if (offen !== picker) { offen.classList.remove('open'); aktualisiereMultiPicker(offen); } });
        if (input.classList.contains('has-selection')) { input.value = ''; input.classList.remove('has-selection'); }
        multiPickerFilternAusInput(input);
      }

      function multiPickerFilternAusInput(input) {
        const picker = input.closest('.multi-picker');
        if (!picker) return;
        const suchtext = String(input.value || '').trim().toLowerCase();
        let sichtbar = 0;
        picker.querySelectorAll('.check-chip').forEach(function(chip) {
          const cb = chip.querySelector('input[type="checkbox"]');
          const basis = chip.getAttribute('data-suchtext') || chip.textContent.toLowerCase();
          const passt = suchtext ? basis.indexOf(suchtext) >= 0 : (cb && cb.checked);
          chip.style.display = passt ? 'flex' : 'none';
          if (passt) sichtbar++;
        });
        let leer = picker.querySelector('.multi-picker-empty');
        if (!leer) { leer = document.createElement('div'); leer.className = 'multi-picker-hint multi-picker-empty'; picker.querySelector('.multi-picker-panel').appendChild(leer); }
        if (!suchtext && sichtbar === 0) { leer.textContent = 'Bitte Suchbegriff eintippen.'; leer.style.display = 'block'; picker.classList.add('open'); return; }
        if (suchtext && sichtbar === 0) { leer.textContent = 'Kein passender Wert gefunden.'; leer.style.display = 'block'; } else { leer.style.display = 'none'; }
        picker.classList.add('open');
      }

      function multiPickerGeaendert(input) {
        const picker = input.closest('.multi-picker');
        if (!picker) return;
        const chip = input.closest('.check-chip');
        if (chip) { if (input.checked) chip.classList.add('selected'); else chip.classList.remove('selected'); }
        const suchfeld = picker.querySelector('.multi-picker-input');
        if (suchfeld) multiPickerFilternAusInput(suchfeld);
      }

      function aktualisiereMultiPicker(picker) {
        const input = picker.querySelector('.multi-picker-input');
        const checked = Array.prototype.slice.call(picker.querySelectorAll('input[type="checkbox"]:checked')).map(function(el) { return el.value; }).filter(Boolean);
        const titel = picker.getAttribute('data-titel') || 'Auswahl';
        picker.querySelectorAll('.check-chip').forEach(function(chip) { const cb = chip.querySelector('input[type="checkbox"]'); if (cb && cb.checked) chip.classList.add('selected'); else chip.classList.remove('selected'); chip.style.display = 'flex'; });
        const leer = picker.querySelector('.multi-picker-empty'); if (leer) leer.style.display = 'none';
        if (!input) return;
        if (!checked.length) { input.value = ''; input.placeholder = titel + ' eintippen'; input.classList.remove('has-selection'); }
        else if (checked.length <= 2) { input.value = checked.join(' | '); input.classList.add('has-selection'); }
        else { input.value = checked.length + ' ausgewählt'; input.classList.add('has-selection'); }
      }

      function aktualisiereMultiPickerInRoot(root) { root.querySelectorAll('.multi-picker').forEach(function(picker) { aktualisiereMultiPicker(picker); }); }

      function splitMehrfachWert(text) { const roh = String(text || '').trim(); if (!roh) return []; return roh.split(/\s*\|\s*|\s*,\s*/).map(function(v) { return String(v || '').trim(); }).filter(Boolean); }
      function checkboxGruppeWerte(root, klasse) { return Array.prototype.slice.call(root.querySelectorAll('input.' + klasse + ':checked')).map(function(el) { return el.value; }).filter(Boolean); }

      function setBusy(status) {
        busy = !!status;

        document.querySelectorAll('button').forEach(function(btn) {
          if (btn.classList.contains('toast-close')) return;
          btn.disabled = busy;
        });

        document.querySelectorAll('select').forEach(function(sel) {
          sel.disabled = busy;
        });

        document.querySelectorAll('input').forEach(function(inp) {
          if (inp.readOnly) return;
          inp.disabled = busy;
        });

        document.querySelectorAll('textarea').forEach(function(ta) {
          if (ta.readOnly) return;
          ta.disabled = busy;
        });
      }

      function zeigeToast(text, typ, optionen) {
        const box = document.getElementById('toastBox');
        const opts = optionen || {};
        if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
        if (!text) { box.style.display = 'none'; box.innerHTML = ''; box.className = ''; return; }
        const art = typ || 'info';
        const meldung = String(text || '');
        const istLadevorgang = /wird|werden|lädt|geladen …|speichert|neu geladen/i.test(meldung);
        const hatOk = opts.mitOk === true;
        const autoMs = opts.autoMs === undefined ? (istLadevorgang || hatOk ? 0 : (art === 'ok' ? 11000 : (art === 'error' ? 20000 : 10000))) : Number(opts.autoMs || 0);
        box.className = art;
        box.innerHTML = '<div class="toast-text">' + escapeHtml(text) + '</div>' + (hatOk ? '<button type="button" class="toast-close" onclick="zeigeToast(\'\', \'info\')">OK</button>' : '');
        box.style.display = 'block';
        if (autoMs > 0) toastTimer = setTimeout(function() { zeigeToast('', 'info'); }, autoMs);
      }

      function zeigeStatus(boxId, text, typ) {
        const box = document.getElementById(boxId);
        if (!box) return;

        const meldung = String(text || '');
        const istLadevorgang = /wird|werden|lädt|geladen …|speichert/i.test(meldung);
        const istNurBedienhinweis = /Bitte Vorgang auswählen/i.test(meldung);

        if (!text) {
          box.style.display = 'none';
          box.innerHTML = '';
          zeigeToast('', 'info');
          return;
        }

        if (istLadevorgang) {
          box.style.display = 'none';
          box.innerHTML = '';
          zeigeToast(meldung, typ || 'info', { autoMs: 0 });
          return;
        }

        if (istNurBedienhinweis) {
          box.style.display = 'none';
          box.innerHTML = '';
          return;
        }

        box.style.display = 'block';
        box.className = 'card';
        box.innerHTML = '<b>' + escapeHtml(text) + '</b>';
        if (typ === 'error') zeigeToast(text, 'error');
        else if (typ === 'ok') zeigeToast(text, 'ok');
      }

      function validiereVorplanung(payload) {
        if (!payload.stoffbesitzer) {

          return false;

        if (!payload.anrufDatum) {

          return false;
        }

        if (!payload.bemerkung) {
          zeigeStatus('statusBoxVorplanung', 'Bemerkung fehlt.', 'error');
          return false;
        }

        return true;
      }

      function maischeSlotHinzufuegen(vorbelegung) {

        const data = vorbelegung || {};

        slotRoot.querySelector('.maische-brenner').innerHTML = optionenHtml(maischeBrennerListe, data.brenner || '', 'Brenner');
        slotRoot.querySelector('.maische-fassgroesse').innerHTML = optionenHtml(maischeFassgroessenListe, data.fassgroesse || '', 'Auswahl');
        slotRoot.querySelector('.maische-materialien').innerHTML = checkboxGruppeHtml(maischeMaterialListe, splitMehrfachWert(data.material || ''), 'maische-material-check', 'Material');
        slotRoot.querySelector('.maische-gewuerze').innerHTML = checkboxGruppeHtml(maischeGewuerzeListe, splitMehrfachWert(data.gewuerze || ''), 'maische-gewuerz-check', 'Gewürze');

        slotRoot.querySelector('.maische-bestehendeZeile').value = data.bestehendeZeile || '';
        slotRoot.querySelector('.maische-tagBrand').value = data.tagBrand || '';
        slotRoot.querySelector('.maische-von').value = data.von || '';
        slotRoot.querySelector('.maische-bis').value = data.bis || '';
        slotRoot.querySelector('.maische-fassnummern').value = data.fassnummern || '';
        slotRoot.querySelector('.maische-inhalt').value = data.inhalt || '';
        aktualisiereMultiPickerInRoot(slotRoot);
      }

      function maischeSlotLoeschen(button) {
        const card = button.closest('.card');
        if (card) card.remove();
      }

      function leseMaischeSlots() {
        const terminMaischeGlobal = document.getElementById('maischeTerminMaischeGlobal').value;
        const anzahlBraendeGlobal = document.getElementById('maischeAnzahlBraendeGlobal').value || '1';
        const zollOkGlobal = document.getElementById('maischeZollOkGlobal').value || '';

        return Array.prototype.slice.call(document.querySelectorAll('#maischeSlotsContainer [data-slot-index]')).map(function(root) {
          const materialien = checkboxGruppeWerte(root, 'maische-material-check');
          const gewuerze = checkboxGruppeWerte(root, 'maische-gewuerz-check');
          return {
            bestehendeZeile: root.querySelector('.maische-bestehendeZeile').value.trim(),
            terminMaische: terminMaischeGlobal,
            tagBrand: root.querySelector('.maische-tagBrand').value,
            von: root.querySelector('.maische-von').value,
            bis: root.querySelector('.maische-bis').value,
            brenner: root.querySelector('.maische-brenner').value,
            fassnummern: root.querySelector('.maische-fassnummern').value.trim(),
            fassgroesse: root.querySelector('.maische-fassgroesse').value,
            inhalt: root.querySelector('.maische-inhalt').value.trim(),
            materialien: materialien,
            material: materialien,
            gewuerze: gewuerze,
            anzahlBraende: anzahlBraendeGlobal,
            zollOk: zollOkGlobal
          };
        });
      }

      function validiereMaischePayload(payload) {
        if (!payload.vorgangsId) {
          zeigeStatus('statusBoxMaische', 'Vorgangs_ID fehlt.', 'error');
          return false;
        }

        if (!payload.stoffbesitzer) {
          zeigeStatus('statusBoxMaische', 'Stoffbesitzer fehlt.', 'error');
          return false;
        }

        if (!payload.terminMaische) {
          zeigeStatus('statusBoxMaische', 'Termin_Maische fehlt.', 'error');
          return false;
        }

        if (!payload.slots.length) {
          zeigeStatus('statusBoxMaische', 'Es ist kein Slot vorhanden.', 'error');
          return false;
        }

        for (let i = 0; i < payload.slots.length; i++) {
          const slot = payload.slots[i];
          const nr = i + 1;

          if (!slot.fassnummern) {
            zeigeStatus('statusBoxMaische', 'Faßnummern fehlen in Slot ' + nr + '.', 'error');
            return false;
          }

          if (!slot.tagBrand) {
            zeigeStatus('statusBoxMaische', 'Brandtag fehlt in Slot ' + nr + '.', 'error');
            return false;
          }

          if (!slot.von || !slot.bis) {
            zeigeStatus('statusBoxMaische', 'von/bis fehlt in Slot ' + nr + '.', 'error');
            return false;
          }

          if (!slot.brenner) {
            zeigeStatus('statusBoxMaische', 'Brenner fehlt in Slot ' + nr + '.', 'error');
            return false;
          }
        }

        return true;
      }

      function speichernMaischeannahmeFrontend() {
        if (busy) return;

        const payload = {
          vorgangsId: document.getElementById('maischeVorgang').value || document.getElementById('maischeVorgangsId').value,
          stoffbesitzer: document.getElementById('maischeStoffbesitzer').value.trim(),
          terminMaische: document.getElementById('maischeTerminMaischeGlobal').value,
          bemerkungVorplanung: document.getElementById('maischeBemerkungVorplanung').value,
          infoSystem: document.getElementById('maischeBemerkungVorplanung').value,
          registernummer: prozessModus === 'brennfreigabe' ? document.getElementById('maischeRegistriernummer').value.trim() : '',
          status: prozessModus === 'brennfreigabe' ? 'IN BRENNFREIGABE' : 'AN ZOLL GESENDET',
          dossierLink: document.getElementById('maischeDossierLink').value.trim(),
          slots: leseMaischeSlots().map(function(slot) {
            if (prozessModus !== 'brennfreigabe') {
              slot.zollOk = '';
            }
            return slot;
          })
        };

        if (!validiereMaischePayload(payload)) return;

        setBusy(true);
        zeigeStatus('statusBoxMaische', (prozessModus === 'brennfreigabe' ? 'Brennfreigabe' : 'Maischeannahme') + ' wird gespeichert …', 'info');

        google.script.run
          .withSuccessHandler(function(result) {
            setBusy(false);
            resetMaischeFormular();
            fuelleMaischeDropdownVorgaenge();
            const meldung = result && result.archiviert
              ? 'Brennfreigabe gespeichert und ins Jahresarchiv übergeben.'
              : (prozessModus === 'brennfreigabe' ? 'Brennfreigabe gespeichert.' : 'Maischeannahme gespeichert.');
            zeigeStatus('statusBoxMaische', meldung, 'ok');
            window.setTimeout(nachSpeichernZurueckInsHauptmenue, 900);
          })
          .withFailureHandler(function(err) {
            setBusy(false);
            zeigeStatus('statusBoxMaische', 'Speichern fehlgeschlagen: ' + leseFehler(err), 'error');
          })[prozessModus === 'brennfreigabe' ? 'saveBrennfreigabe' : 'saveMaischeannahme'](payload);
      }

      function druckeBrennprotokollAusMaske() {
        if (busy || prozessModus !== 'brennfreigabe') return;

        const datum = ermittleBrandtagAusMaske();
        if (!datum) {
          zeigeStatus('statusBoxMaische', 'Für den Druck muss genau ein Brandtag im Vorgang vorhanden sein.', 'error');
          return;
        }

        setBusy(true);
        zeigeStatus('statusBoxMaische', 'Brennprotokoll wird erstellt …', 'info');

        google.script.run
          .withSuccessHandler(function(html) {
            setBusy(false);
            if (!html || String(html).trim() === '') {
              zeigeStatus('statusBoxMaische', 'Für den gewählten Brandtag wurde kein Brennprotokoll geliefert.', 'error');
              return;
            }

            const frame = document.getElementById('maischePrintFrame');
            const frameDoc = frame.contentWindow && frame.contentWindow.document;
            if (!frameDoc) {
              zeigeStatus('statusBoxMaische', 'Druckrahmen konnte nicht initialisiert werden.', 'error');
              return;
            }

            frameDoc.open();
            frameDoc.write(html || '');
            frameDoc.close();

            setTimeout(function() {
              frame.contentWindow.focus();
              frame.contentWindow.print();
            }, 250);
          })
          .withFailureHandler(function(err) {
            setBusy(false);
            zeigeStatus('statusBoxMaische', 'Druck fehlgeschlagen: ' + leseFehler(err), 'error');
          })
          .getProtokollHtmlFuerBrandtag(datum);
      }

      function ermittleBrandtagAusMaske() {
        const werte = Array.prototype.slice.call(document.querySelectorAll('#maischeSlotsContainer .maische-tagBrand'))
          .map(function(el) { return String(el.value || '').trim(); })
          .filter(Boolean);
        const uniq = Array.from(new Set(werte));
        return uniq.length === 1 ? uniq[0] : '';
      }

      document.addEventListener('click', function(event) {
        if (!event.target.closest('.multi-picker')) {
          document.querySelectorAll('.multi-picker.open').forEach(function(picker) {
            picker.classList.remove('open');
            aktualisiereMultiPicker(picker);
          });
        }
      });

      window.addEventListener('load', function() {
        zeigeStartUebersicht();
        document.getElementById('statusBoxVorplanung').style.display = 'none';
        document.getElementById('statusBoxMaische').style.display = 'none';

        if (START_MODUS === 'vorplanung') {
          oeffneVorplanung();
          return;
        }

        if (START_MODUS === 'maischeannahme') {
          oeffneMaischeannahme();
          return;
        }

        if (START_MODUS === 'brennfreigabe') {
          oeffneBrennfreigabe();
          return;
        }
      });
    </script>
  </body>
</html>
