<style>
  :root {
    --pink: #ff007f;
    --pink-dark: #800040;
    --neon: #00ff00;
    --bg-dark: #222222;
    --card-bg: #2a2a2a;
    --input-bg: #1a1a1a;
    --line: #444444;
    --text-soft: #bbbbbb;
    --neo-out: 12px 12px 24px #151515, -12px -12px 24px #333333;
    --neo-in: inset 8px 8px 16px #111111, inset -8px -8px 16px #3a3a3a;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body {
    font-family: Arial, sans-serif;
    font-weight: 700;
    background: var(--bg-dark);
    color: #ffffff;
    padding: 10px;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  .main-frame {
    width: 100%;
    max-width: 1250px;
    background: var(--bg-dark);
    border-radius: 30px;
    box-shadow: var(--neo-out);
    padding: 25px;
    border: 1px solid #333333;
  }

  #mainTitle {
    margin: 0 0 5px 0;
    color: var(--pink);
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
  }

  .header-top {
    display: grid;
    grid-template-columns: 220px 1fr 220px;
    gap: 20px;
    margin-bottom: 20px;
    align-items: center;
  }

  .header-center {
    text-align: center;
  }

  .visual-cal {
    background: var(--card-bg);
    border-radius: 15px;
    padding: 10px;
    box-shadow: var(--neo-in);
    text-align: center;
    font-size: 11px;
    min-height: 120px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-top: 5px;
  }

  .cal-h {
    font-weight: 900;
    color: var(--pink);
    font-size: 9px;
  }

  .cal-d {
    padding: 2px;
    border-radius: 3px;
    font-size: 10px;
  }

  .cal-today {
    background: var(--pink);
    color: #ffffff;
    border-radius: 4px;
    font-weight: 900;
  }

  .sub-info {
    font-size: 12px;
    color: #888888;
    margin: 4px 0 0 0;
  }

  .sub-info-strong {
    color: #dddddd;
    font-size: 13px;
    font-weight: 900;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .ticker-led {
    background: #000000;
    border: 2px solid var(--pink);
    border-radius: 15px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
  }

  .ticker-label {
    font-size: 10px;
    color: #aaaaaa;
  }

  .ticker-led span {
    display: inline-block;
    font-size: 32px;
    font-family: "Courier New", monospace;
    font-weight: 900;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }

  .status-box {
    margin: 0 0 20px 0;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 13px;
    letter-spacing: 0.4px;
    box-shadow: var(--neo-in);
  }

  .status-info {
    background: #1c1c1c;
    color: #dddddd;
  }

  .status-ok {
    background: #102010;
    color: #9cff9c;
  }

  .status-error {
    background: #2a1118;
    color: #ffb6c9;
  }

  .tab-nav {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    padding: 18px;
    border: none;
    border-radius: 15px;
    background: var(--card-bg);
    color: var(--neon);
    cursor: pointer;
    transition: 0.2s ease;
    font-weight: 900;
    font-size: 14px;
    box-shadow: var(--neo-out);
    text-shadow: 0 0 8px rgba(0, 255, 0, 0.7);
  }

  .tab-btn:hover {
    color: var(--neon);
    text-shadow: 0 0 12px rgba(0, 255, 0, 0.95);
  }

  .tab-btn.active {
    color: var(--neon);
    background: var(--pink);
    box-shadow: inset 8px 8px 15px rgba(0, 0, 0, 0.6), inset -8px -8px 15px rgba(255, 255, 255, 0.2);
    text-shadow: 0 0 12px rgba(0, 255, 0, 1);
  }

  .tab-btn-small {
    width: 56px;
    flex: 0 0 56px;
    padding: 10px;
  }

  .content-shell {
    min-height: 420px;
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  .card {
    background: var(--card-bg);
    border-radius: 25px;
    padding: 22px;
    box-shadow: var(--neo-out);
    margin-bottom: 25px;
  }

  .toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 15px;
  }

  .top-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    gap: 20px;
  }

  .grid-actions {
    display: flex;
    justify-content: flex-start;
    margin-top: 10px;
  }

  .owner-header {
    font-size: 20px;
    color: #ffffff;
    font-weight: 900;
    margin-bottom: 15px;
    border-bottom: 3px solid var(--pink);
    padding-bottom: 8px;
    text-transform: uppercase;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--pink);
    font-weight: 900;
  }

  input,
  select,
  button,
  textarea {
    font-family: inherit;
  }

  input,
  select {
    width: 100%;
    background: var(--input-bg);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    box-shadow: var(--neo-in);
    outline: none;
    color-scheme: dark;
  }

  input:focus,
  select:focus {
    box-shadow: var(--neo-in), 0 0 5px var(--pink);
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
  }

  th {
    color: var(--pink);
    font-size: 11px;
    padding: 10px;
    text-align: left;
    text-transform: uppercase;
  }

  td {
    padding: 12px 10px;
    background: rgba(0, 0, 0, 0.2);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }

  td:first-child {
    border-left: 1px solid var(--line);
    border-top-left-radius: 15px;
    border-bottom-left-radius: 15px;
  }

  td:last-child {
    border-right: 1px solid var(--line);
    border-top-right-radius: 15px;
    border-bottom-right-radius: 15px;
  }

  .fass-brand-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-badge {
    min-width: 48px;
    display: inline-block;
    text-align: center;
    background: #000000;
    color: var(--neon);
    border: 1px solid var(--neon);
    border-radius: 10px;
    padding: 6px 12px;
    font-family: monospace;
    font-size: 16px;
    font-weight: 900;
  }

  .inline-number {
    max-width: 90px;
  }

  .btn-util {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: var(--card-bg);
    color: #ffffff;
    cursor: pointer;
    box-shadow: var(--neo-out);
    font-size: 11px;
    font-weight: 900;
    transition: 0.2s ease;
  }

  .btn-util:hover {
    color: var(--pink);
  }

  .btn-remove {
    min-width: 44px;
  }

  .save-shell {
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    gap: 20px;
    padding-top: 10px;
  }

  .status-select-wrap {
    width: 250px;
    flex: 0 0 250px;
  }

  .btn-save {
    width: 100%;
    min-height: 68px;
    padding: 22px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(145deg, var(--pink), var(--pink-dark));
    color: #ffffff;
    font-size: 22px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(255, 0, 127, 0.4);
  }

  .btn-save:disabled {
    opacity: 0.6;
    cursor: wait;
  }

  @media (max-width: 768px) {
    body {
      padding: 4px;
    }

    .main-frame {
      padding: 10px;
      border-radius: 18px;
    }

    #mainTitle {
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: 1px;
    }

    .status-box {
      margin-bottom: 10px;
      padding: 10px 12px;
      font-size: 12px;
    }

    .tab-nav {
      gap: 6px;
      margin-bottom: 10px;
      flex-direction: row;
      flex-wrap: wrap;
    }

    .tab-btn {
      flex: 1 1 calc(50% - 6px);
      min-height: 40px;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 11px;
      line-height: 1.1;
    }

    .tab-btn-small {
      flex: 0 0 40px;
      width: 40px;
      min-width: 40px;
      padding: 8px 0;
    }

    .card {
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .toolbar {
      gap: 6px;
      padding: 8px;
      flex-wrap: wrap;
    }

    .owner-header {
      font-size: 15px;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom-width: 2px;
    }

    input,
    select,
    textarea,
    button {
      min-height: 38px;
      font-size: 13px;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .btn-save {
      min-height: 40px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
    }

    label {
      margin-bottom: 4px;
      font-size: 9px;
      line-height: 1.05;
    }

    .content-shell {
      min-height: 0;
    }
  }


  @media (max-width: 980px) {
    .header-top {
      grid-template-columns: 1fr;
    }

    .header-center {
      order: -1;
    }

    .top-grid {
      grid-template-columns: 1fr;
    }

    .save-shell {
      flex-direction: column;
      align-items: stretch;
    }

    .status-select-wrap {
      width: 100%;
      flex: 1 1 auto;
    }

    .tab-nav {
      flex-direction: column;
    }
  }
</style>
