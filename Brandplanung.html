  <body>
    <div class="main-frame">
      <h1 class="brandplanung-header-ausgeblendet">OGV BREITFURT – BRANDPLANUNG</h1>

      <div id="startAnsicht" class="card" style="display:block; text-align:center; padding:22px 14px;">
        <button
          id="btnStartBrandplanung"
          class="btn-save"
          type="button"

          Brandplanung öffnen

      <div id="formularAnsicht" class="card" style="display:none;">
        <input id="vorgangsId" type="hidden">

        <div style="display:grid; grid-template-columns:1fr; gap:10px;">
          <div>
            <label for="brandplanungVorgang">Vorgang aus Vorplanung</label>
            <select id="brandplanungVorgang" onchange="vorgangGeaendert()" style="color:#00ff00;"></select>
          </div>

          <div id="vorplanungBlock" style="display:grid; grid-template-columns:minmax(0, 1fr) minmax(150px, 210px) minmax(120px, 150px) minmax(170px, 220px); gap:10px; align-items:start;">
            <div style="max-width:360px;">
              <label for="bemerkungVorplanung" class="bemerkung-tab-label">Bemerkung_Vorplanung</label>
              <textarea
                id="bemerkungVorplanung"
                rows="2"
                readonly
                style="background:#2a2a2a; color:#00ff00; border:1px solid #444; border-radius:10px; resize:vertical; width:100%; min-height:62px; height:62px; padding:10px 12px; font-weight:700; box-shadow:var(--neo-in);"
              ></textarea>
            </div>

            <div>
              <label for="datumMaischeannahmeGlobal">Datum_Maischeannahme</label>
              <input
                id="datumMaischeannahmeGlobal"
                type="date"
                style="color:#00ff00;"
              >
            </div>

            <div>
              <label for="anzahlBraendeGlobal">Anzahl_Brände</label>
              <input
                id="anzahlBraendeGlobal"
                type="number"
                min="1"
                step="1"
                value="1"
                style="color:#00ff00;"
              >
            </div>

            <div>
              <label for="checklisteVersenden" class="checkliste-tab-label">Checkliste</label>
              <label for="checklisteVersenden" class="checkliste-tab-field">
                <input
                  id="checklisteVersenden"
                  type="checkbox"
                  class="checkliste-checkbox"
                >
                <span class="checkliste-text">Versenden</span>
              </label>
            </div>
          </div>
        </div>

        <div id="brandtageBereich" class="card" style="margin-top:12px; padding:14px;">
          <div id="brandtageContainer" style="display:grid; gap:10px;"></div>

          <div style="margin-top:8px; display:grid; grid-template-columns:minmax(54px, 62px) minmax(200px, 300px); gap:10px; align-items:end; max-width:372px;">
            <div>
              <button
                type="button"
                class="btn-save btn-plus-klein"
                onclick="brandtagZeileHinzufuegen()"
                aria-label="Brand hinzufügen"
                title="Brand hinzufügen"
              >+</button>
            </div>

            <div>
              <label for="statusGlobal">Status</label>
              <select id="statusGlobal" style="color:#00ff00;"></select>
            </div>
          </div>
        </div>

        <div style="margin-top:18px; display:grid; grid-template-columns:minmax(0, 1fr) minmax(0, 1fr); gap:10px;">
          <button
            id="btnSchliessen"
            class="btn-save"
            type="button"
            onclick="zurueckOderUebersicht()"
            style="width:100%;"
          >
            Zurück zur Übersicht
          </button>

          <button id="btnSpeichern" class="btn-save" type="button" onclick="speichernBrandplanung()" style="width:100%;">
            Speichern
          </button>
        </div>
      </div>

      <div id="statusBox" class="toast-box" style="display:none;"></div>
    </div>

    <script>
      let busy = false;
      const RETURN_MODUS = '<?!= typeof returnModus !== "undefined" ? returnModus : "" ?>';
      const ORIGIN_MODUS = '<?!= typeof originModus !== "undefined" ? originModus : "" ?>';
      const IST_ADMIN_RUECKSPRUNG = <?!= typeof istAdminRuecksprung !== "undefined" && istAdminRuecksprung ? 'true' : 'false' ?>;
      const WEBAPP_URL = '<?!= typeof webAppUrl !== "undefined" ? webAppUrl : "" ?>';
      const GITHUB_INDEX_URL = 'https://fraumecker.github.io/brennerei-startogv/';
      const GITHUB_ADMIN_URL = 'https://fraumecker.github.io/brennerei-startogv/admin.html';
      const IST_COCKPIT_RUECKSPRUNG = String(ORIGIN_MODUS || '').toLowerCase() === 'cockpit' || String(RETURN_MODUS || '').toLowerCase() === 'cockpit';
      let vorgaenge = [];
      let brennerListe = [];
      let statusListe = ['IN ORGA', 'TERMINIERT', 'IN MAISCHEANNAHME ÜBERGEBEN'];
      let brandtagIndex = 0;

      function escapeHtml(text) {
        if (text == null) return '';
        return String(text).replace(/[&<>"']/g, function(m) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          }[m];
        });
      }

      function leseFehler(err) {
        return err && err.message ? err.message : String(err || 'Unbekannter Fehler');
      }

      function holeBasisUrl() {
        const webApp = String(WEBAPP_URL || '').trim();
        if (webApp) return webApp.split('?')[0];

        const href = String(window.location.href || '').trim();
        if (!href) return '';
        return href.split('?')[0];
      }

      function setBusy(status) {
        busy = !!status;
        const buttons = document.querySelectorAll('button');
        buttons.forEach(function(btn) {
          btn.disabled = busy;
        });
      }

      function zeigeStatus(text, typ) {
        const box = document.getElementById('statusBox');
        const meldung = String(text || '');
        const istNurBedienhinweis = /Bitte Vorgang auswählen/i.test(meldung);

        if (istNurBedienhinweis) {
          box.style.display = 'none';
          box.innerHTML = '';
          box.className = 'toast-box';
          return;
        }

        box.style.display = text ? 'block' : 'none';
        box.className = 'toast-box';
        box.style.borderLeft = '6px solid #ff007f';
        box.innerHTML = '';

        if (!text) return;

        if (typ === 'ok') box.style.borderLeft = '6px solid #00ff00';
        else if (typ === 'error') box.style.borderLeft = '6px solid #ff3b3b';
        else box.style.borderLeft = '6px solid #ff007f';

        box.innerHTML = '<div class="toast-text">' + escapeHtml(text) + '</div>';

        const istLadevorgang = /wird|werden|lädt|geladen …|speichert/i.test(meldung);
        if (istLadevorgang) return;

        const dauer = typ === 'error' ? 22000 : (typ === 'ok' ? 7000 : 12000);
        window.setTimeout(function() {
          if (box.textContent === meldung) zeigeStatus('', 'info');
        }, dauer);
      }

      function zielModusFuerRuecksprung() {
        const istAdmin = IST_ADMIN_RUECKSPRUNG ||
          String(ORIGIN_MODUS || '').toLowerCase() === 'admin' ||
          String(RETURN_MODUS || '').toLowerCase() === 'admin';

        if (istAdmin) return 'admin';
        if (IST_COCKPIT_RUECKSPRUNG) return 'index';
        return '';
      }

      function geheZurueckZumHauptmenue() {
        const zielModus = zielModusFuerRuecksprung();

        if (zielModus === 'admin') {
          window.top.location.href = GITHUB_ADMIN_URL;
          return;
        }

        if (zielModus === 'index') {
          window.top.location.href = GITHUB_INDEX_URL;
          return;
        }

        startansichtZeigen();
      }

      function nachSpeichernZurueckInsHauptmenue() {
        zeigeStatus('', 'info');
        geheZurueckZumHauptmenue();
      }

      function zurueckOderUebersicht() {
        zeigeStatus('', 'info');
        geheZurueckZumHauptmenue();
      }

      function optionenHtml(liste, selectedValue, placeholder) {
        const selected = String(selectedValue || '').trim();
        let html = '<option value="">' + escapeHtml(placeholder || 'Bitte wählen') + '</option>';

        (liste || []).forEach(function(item) {
          const value = typeof item === 'string' ? item : String(item.value || '');
          const label = typeof item === 'string' ? item : String(item.label || item.value || '');
          if (!String(value || '').trim()) return;
          html += '<option value="' + escapeHtml(value) + '"' + (value === selected ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
        });

        return html;
      }

      function startansichtZeigen() {
        document.getElementById('startAnsicht').style.display = 'block';
        document.getElementById('formularAnsicht').style.display = 'none';
      }

      function formularansichtZeigen() {
        document.getElementById('startAnsicht').style.display = 'none';
        document.getElementById('formularAnsicht').style.display = 'block';
      }

      function setzeStatusGlobalDropdown(selectedValue) {
        document.getElementById('statusGlobal').innerHTML = optionenHtml(
          statusListe,
          selectedValue || 'TERMINIERT',
          'Bitte Status wählen'
        );
      }

      function formularLeeren() {
        document.getElementById('brandplanungVorgang').innerHTML = '<option value="">Bitte Vorgang wählen</option>';
        document.getElementById('vorgangsId').value = '';
        document.getElementById('bemerkungVorplanung').value = '';
        document.getElementById('datumMaischeannahmeGlobal').value = '';
        document.getElementById('anzahlBraendeGlobal').value = '1';
        document.getElementById('brandtageContainer').innerHTML = '';
        document.getElementById('checklisteVersenden').checked = false;
        brandtagIndex = 0;
        setzeStatusGlobalDropdown('TERMINIERT');
      }

      function resetVorgangsdatenOhneDropdown() {
        document.getElementById('vorgangsId').value = '';
        document.getElementById('bemerkungVorplanung').value = '';
        document.getElementById('datumMaischeannahmeGlobal').value = '';
        document.getElementById('anzahlBraendeGlobal').value = '1';
        document.getElementById('brandtageContainer').innerHTML = '';
        document.getElementById('checklisteVersenden').checked = false;
        brandtagIndex = 0;
        setzeStatusGlobalDropdown('TERMINIERT');
      }

      function fuelleVorgangsDropdown() {
        const liste = vorgaenge.map(function(item) {
          return {
            value: item.vorgangsId || '',
            label: item.anzeige || item.vorgangsId || ''
          };
        });

        document.getElementById('brandplanungVorgang').innerHTML = optionenHtml(liste, '', 'Bitte Vorgang wählen');
      }

      function fuelleGespeicherteBrandplanung(details) {
        document.getElementById('vorgangsId').value = details && details.vorgangsId ? details.vorgangsId : '';
        document.getElementById('bemerkungVorplanung').value = details && details.bemerkungVorplanung ? details.bemerkungVorplanung : '';
        document.getElementById('datumMaischeannahmeGlobal').value = details && details.datumMaischeannahmeGlobal ? details.datumMaischeannahmeGlobal : '';
        document.getElementById('anzahlBraendeGlobal').value = details && details.anzahlBraendeGlobal ? details.anzahlBraendeGlobal : '1';
        setzeStatusGlobalDropdown(details && details.statusGlobal ? details.statusGlobal : 'TERMINIERT');

        const container = document.getElementById('brandtageContainer');
        container.innerHTML = '';
        brandtagIndex = 0;

        const planungen = details && Array.isArray(details.planungen) ? details.planungen : [];
        if (planungen.length) {
          planungen.forEach(function(item) {
            brandtagZeileHinzufuegen(item);
          });
        } else {
          brandtagZeileHinzufuegen();
        }
      }

      function vorgangGeaendert() {
        const vorgangsId = document.getElementById('brandplanungVorgang').value;

        if (!vorgangsId) {
          resetVorgangsdatenOhneDropdown();
          return;
        }

        setBusy(true);
        zeigeStatus('Brandplanung wird geladen …', 'info');

        google.script.run
          .withSuccessHandler(function(details) {
            setBusy(false);
            fuelleGespeicherteBrandplanung(details || {});
            zeigeStatus('Vorgang geladen.', 'ok');
          })
          .withFailureHandler(function(err) {
            setBusy(false);
            zeigeStatus('Vorgang konnte nicht geladen werden: ' + leseFehler(err), 'error');
          })
          .getBrandplanungDetails(vorgangsId);
      }

      function naechstesBrandtagFeldAktivieren(aktuellesElement) {
        if (!aktuellesElement) return;
        const wrapper = aktuellesElement.closest('[data-brandtag-index]');
        if (!wrapper) return;

        const felder = Array.from(wrapper.querySelectorAll('.bp-brandtag, .bp-zeitslotVon, .bp-zeitslotBis, .bp-brenner, .bp-bemerkungIntern'));
        const index = felder.indexOf(aktuellesElement);
        if (index < 0 || index >= felder.length - 1) return;

        const nextField = felder[index + 1];
        if (nextField && typeof nextField.focus === 'function') {
          window.setTimeout(function() {
            nextField.focus();
            if (typeof nextField.select === 'function' && nextField.tagName === 'INPUT') nextField.select();
          }, 30);
        }
      }

      function zeitfeldEingabeBehandeln(event) {
        const feld = event && event.target ? event.target : null;
        if (!feld) return;
        const wert = String(feld.value || '').trim();
        if (/^\d{2}:\d{2}$/.test(wert)) {
          naechstesBrandtagFeldAktivieren(feld);
        }
      }

      function brandtagZeileHinzufuegen(vorbelegung) {
        brandtagIndex += 1;
        const idx = brandtagIndex;
        const container = document.getElementById('brandtageContainer');
        const wrapper = document.createElement('div');
        wrapper.className = 'card compact-brandtab';
        wrapper.setAttribute('data-brandtag-index', String(idx));

        wrapper.innerHTML = ''
          + '<div class="brandtab-grid-main">'
          + '  <div><label class="brandtab-label-green">Brandtag</label><input type="date" class="bp-brandtag brandtab-input-green"></div>'
          + '  <div><label class="brandtab-label-green">von</label><input type="time" class="bp-zeitslotVon brandtab-input-green" oninput="zeitfeldEingabeBehandeln(event)" onchange="zeitfeldEingabeBehandeln(event)"></div>'
          + '  <div><label class="brandtab-label-green">bis</label><input type="time" class="bp-zeitslotBis brandtab-input-green" oninput="zeitfeldEingabeBehandeln(event)" onchange="zeitfeldEingabeBehandeln(event)"></div>'
          + '  <div><label class="brandtab-label-green">Brenner</label><select class="bp-brenner brandtab-input-green">' + optionenHtml(brennerListe, '', 'Bitte Brenner wählen') + '</select></div>'
          + '  <div><label for="bpBemerkungIntern_' + idx + '" class="bemerkung-tab-label">Bemerkung_Intern</label><textarea id="bpBemerkungIntern_' + idx + '" class="bp-bemerkungIntern bemerkung-tab-field" rows="1"></textarea></div>'
          + '  <div class="brandtab-remove-cell"><button type="button" class="compact-remove-btn" onclick="brandtagZeileEntfernen(' + idx + ')" aria-label="Brand entfernen" title="Brand entfernen">X</button></div>'
          + '</div>';

        container.appendChild(wrapper);

        if (vorbelegung) {
          wrapper.querySelector('.bp-brandtag').value = vorbelegung.brandtag || '';
          wrapper.querySelector('.bp-brenner').value = vorbelegung.brenner || '';
          wrapper.querySelector('.bp-zeitslotVon').value = vorbelegung.zeitslotVon || '';
          wrapper.querySelector('.bp-zeitslotBis').value = vorbelegung.zeitslotBis || '';
          wrapper.querySelector('.bp-bemerkungIntern').value = vorbelegung.bemerkungIntern || '';
        }
      }

      function brandtagZeileEntfernen(idx) {
        if (busy) return;
        const container = document.getElementById('brandtageContainer');
        const element = container.querySelector('[data-brandtag-index="' + idx + '"]');
        if (element) {
          element.remove();
        }
        if (!container.children.length) {
          brandtagZeileHinzufuegen();
        }
      }

      function brandplanungStarten() {
        if (busy) return;

        setBusy(true);
        zeigeStatus('Interne Brandplanung wird geladen …', 'info');

        google.script.run
          .withSuccessHandler(function(offen) {
            vorgaenge = offen && Array.isArray(offen.vorgaenge) ? offen.vorgaenge : [];

            google.script.run
              .withSuccessHandler(function(brenner) {
                setBusy(false);
                brennerListe = Array.isArray(brenner) ? brenner : [];
                formularLeeren();
                fuelleVorgangsDropdown();
                formularansichtZeigen();

                if (!vorgaenge.length) {
                  zeigeStatus('Keine offenen Vorgänge für die Brandplanung vorhanden.', 'info');
                  return;
                }

                zeigeStatus('Bitte Vorgang auswählen.', 'info');
              })
              .withFailureHandler(function(err) {
                setBusy(false);
                zeigeStatus('Brennerliste konnte nicht geladen werden: ' + leseFehler(err), 'error');
              })
              .getBrandplanungBrennerListe();
          })
          .withFailureHandler(function(err) {
            setBusy(false);
            zeigeStatus('Brandplanung konnte nicht geladen werden: ' + leseFehler(err), 'error');
          })
          .getBrandplanungOffeneVorgaenge();
      }

      function istBrandzeileLeer(eintrag) {
        return !(
          String(eintrag.brandtag || '').trim() ||
          String(eintrag.brenner || '').trim() ||
          String(eintrag.zeitslotVon || '').trim() ||
          String(eintrag.zeitslotBis || '').trim() ||
          String(eintrag.bemerkungIntern || '').trim()
        );
      }

      function liesPlanungenAusMaske() {
        const datumMaischeannahmeGlobal = document.getElementById('datumMaischeannahmeGlobal').value;
        const anzahlBraendeGlobal = document.getElementById('anzahlBraendeGlobal').value || '1';
        const statusGlobal = document.getElementById('statusGlobal').value;
        const rows = Array.from(document.querySelectorAll('#brandtageContainer [data-brandtag-index]'));

        return rows.map(function(row) {
          return {
            datumMaischeannahme: datumMaischeannahmeGlobal,
            brandtag: row.querySelector('.bp-brandtag').value,
            brenner: row.querySelector('.bp-brenner').value,
            zeitslotVon: row.querySelector('.bp-zeitslotVon').value,
            zeitslotBis: row.querySelector('.bp-zeitslotBis').value,
            anzahlBraende: anzahlBraendeGlobal,
            status: statusGlobal,
            bemerkungIntern: row.querySelector('.bp-bemerkungIntern').value.trim()
          };
        }).filter(function(eintrag) {
          return !istBrandzeileLeer(eintrag);
        });
      }

      function payloadLesen() {
        return {
          vorgangsId: document.getElementById('vorgangsId').value.trim(),
          anzahlBraende: document.getElementById('anzahlBraendeGlobal').value || '1',
          checklisteVersenden: document.getElementById('checklisteVersenden').checked === true,
          planungen: liesPlanungenAusMaske()
        };
      }

      function validiere(payload) {
        const statusGlobal = document.getElementById('statusGlobal').value;

        if (!payload.vorgangsId) {
          zeigeStatus('Vorgangs_ID fehlt.', 'error');
          return false;
        }

        if (!statusGlobal) {
          zeigeStatus('Status fehlt.', 'error');
          return false;
        }

        if (!Array.isArray(payload.planungen) || !payload.planungen.length) {
          zeigeStatus('Es wurde kein Brandtag erfasst.', 'error');
          return false;
        }

        for (let i = 0; i < payload.planungen.length; i++) {
          const p = payload.planungen[i];
          const nr = i + 1;

          if (!p.brandtag) {
            zeigeStatus('Brandtag fehlt in Brand ' + nr + '.', 'error');
            return false;
          }
          if (!p.brenner) {
            zeigeStatus('Brenner fehlt in Brand ' + nr + '.', 'error');
            return false;
          }
          if (!p.zeitslotVon) {
            zeigeStatus('von fehlt in Brand ' + nr + '.', 'error');
            return false;
          }
          if (!p.zeitslotBis) {
            zeigeStatus('bis fehlt in Brand ' + nr + '.', 'error');
            return false;
          }

          const von = new Date('1970-01-01T' + p.zeitslotVon + ':00');
          const bis = new Date('1970-01-01T' + p.zeitslotBis + ':00');

          if (isNaN(von.getTime())) {
            zeigeStatus('von ist ungültig in Brand ' + nr + '.', 'error');
            return false;
          }
          if (isNaN(bis.getTime())) {
            zeigeStatus('bis ist ungültig in Brand ' + nr + '.', 'error');
            return false;
          }
          if (bis.getTime() <= von.getTime()) {
            zeigeStatus('bis muss nach von liegen. Fehler in Brand ' + nr + '.', 'error');
            return false;
          }
        }

        return true;
      }

      function zurStartansicht() {
        if (busy) return;
        formularLeeren();
        startansichtZeigen();
        zeigeStatus('', 'info');
      }

      function speichernBrandplanung() {
        if (busy) return;

        const payload = payloadLesen();
        if (!validiere(payload)) return;

        setBusy(true);
        zeigeStatus('Brandplanung wird gespeichert …', 'info');

        google.script.run
          .withSuccessHandler(function(result) {
            let meldung = 'Brandplanung gespeichert. Datensätze: ' + (result && result.anzahl ? result.anzahl : payload.planungen.length) + '.';

            if (payload.checklisteVersenden === true && result && result.checkliste) {
              if (result.checkliste.versendet && result.checkliste.kanal === 'E-MAIL') {
                meldung += ' Checkliste per E-Mail versendet.';
              } else if (result.checkliste.hinweis) {
                meldung += ' ' + result.checkliste.hinweis;
              }
            }

            setBusy(false);
            startansichtZeigen();
            zeigeStatus(meldung, 'ok');
            window.setTimeout(nachSpeichernZurueckInsHauptmenue, 1200);
          })
          .withFailureHandler(function(err) {
            setBusy(false);
            zeigeStatus('Speichern fehlgeschlagen: ' + leseFehler(err), 'error');
          })
          .saveBrandplanung(payload);
      }

      window.addEventListener('load', function() {
        setzeStatusGlobalDropdown();

        const direktOeffnen =
          IST_ADMIN_RUECKSPRUNG ||
          String(ORIGIN_MODUS || '').toLowerCase() === 'admin' ||
          String(RETURN_MODUS || '').toLowerCase() === 'admin';

        if (direktOeffnen) {
          brandplanungStarten();
          return;
        }

        startansichtZeigen();
      });
    </script>
