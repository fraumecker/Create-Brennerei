    <script>
      let adminPinToken = '';
      let mitgliederCache = [];
      let sucheTimer = null;
      let aktuellerModus = 'bearbeiten';
      let aktuelleZeile = 0;
      let aktuellerDriveUrl = '';

      const feldMap = {
        MitgliederID: 'feldMitgliederID',
        Stoffbesitzernummer: 'feldStoffbesitzernummer',
        Zuname: 'feldZuname',
        Vorname: 'feldVorname',
        PLZ: 'feldPLZ',
        Wohnort: 'feldWohnort',
        'Straße': 'feldStrasse',
        'Nr.': 'feldNr',
        'Geb.datum': 'feldGebdatum',
        Eintritt: 'feldEintritt',
        Telefon: 'feldTelefon',
        'E-Mail': 'feldEmail',
        NameAnzeige: 'feldNameAnzeige',
        Vereinsmitglied: 'feldVereinsmitglied'
      };

      function setText(id, text) {
        const el = document.getElementById(id);
        if (el) el.textContent = text || '';
      }

      function esc(text) {
        return String(text == null ? '' : text).replace(/[&<>"']/g, function(m) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          }[m];
        });
      }

      function ansichtSuche() {
        document.getElementById('mitgliederSucheMaske').classList.remove('admin-hidden');
        document.getElementById('mitgliederDetailMaske').classList.add('admin-hidden');
      }

      function ansichtDetail() {
        document.getElementById('mitgliederSucheMaske').classList.add('admin-hidden');
        document.getElementById('mitgliederDetailMaske').classList.remove('admin-hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function adminPinFreischalten() {
        const pin = document.getElementById('adminPin').value.trim();

        if (!pin) {
          setText('pinStatus', 'PIN fehlt.');
          return;
        }

        setText('pinStatus', 'PIN wird geprüft ...');

        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) {
              setText('pinStatus', 'PIN ungültig.');
              return;
            }

            adminPinToken = pin;

            document.getElementById('mitgliederBereich').classList.remove('admin-hidden');
            document.body.classList.add('admin-members-open');

            setText('pinStatus', '');
            sucheLeeren();

            mitgliederCache = [];
            renderMitgliederTreffer();

            setText('listenStatus', '');
            ansichtSuche();

            const suche = document.getElementById('mitgliedSuche');
            if (suche) suche.focus();
          })
          .withFailureHandler(function(err) {
            setText('pinStatus', err && err.message ? err.message : String(err));
          })
          .adminMitgliederPinPruefen(pin);
      }

      function zurueckZumAdminMenue() {
        document.body.classList.remove('admin-members-open');
        document.getElementById('mitgliederBereich').classList.add('admin-hidden');

        adminPinToken = '';

        const pin = document.getElementById('adminPin');
        if (pin) pin.value = '';

        sucheLeeren();
        formularLeeren({ ohneAnsichtWechsel: true });

        mitgliederCache = [];
        renderMitgliederTreffer();

        setText('listenStatus', '');
        setText('pinStatus', '');
      }

      function mitgliederSucheVerzoegert() {
        clearTimeout(sucheTimer);

        const suchtext = document.getElementById('mitgliedSuche').value.trim();

        if (suchtext.length < 2) {
          mitgliederCache = [];
          renderMitgliederTreffer();
          setText('listenStatus', '');
          return;
        }

        sucheTimer = setTimeout(function() {
          mitgliederLaden(false);
        }, 250);
      }

      function mitgliederLaden(force) {
        if (!adminPinToken) {
          setText('listenStatus', 'PIN fehlt.');
          return;
        }

        const suchtext = document.getElementById('mitgliedSuche').value.trim();

        if (suchtext.length < 2) {
          mitgliederCache = [];
          renderMitgliederTreffer();
          setText('listenStatus', force ? 'Mindestens 2 Zeichen.' : '');
          return;
        }

        setText('listenStatus', 'Lade ...');

        google.script.run
          .withSuccessHandler(function(res) {
            const roh = res && res.mitglieder ? res.mitglieder : [];

            mitgliederCache = roh.filter(function(m) {
              return mitgliedHatInhalt(m);
            });

            renderMitgliederTreffer();

            setText(
              'listenStatus',
              mitgliederCache.length ? mitgliederCache.length + ' Treffer. Eintrag anklicken.' : 'Keine Treffer'
            );
          })
          .withFailureHandler(function(err) {
            setText('listenStatus', err && err.message ? err.message : String(err));
          })
          .adminMitgliederListeLaden(adminPinToken, suchtext);
      }

      function mitgliedHatInhalt(m) {
        if (!m) return false;

        return !!String([
          m.NameAnzeige,
          m.Zuname,
          m.Vorname,
          m.Stoffbesitzernummer,
          m.Wohnort,
          m.Telefon,
          m['E-Mail']
        ].join('')).trim();
      }

      function mitgliedName(m) {
        const nameAnzeige = String(m && m.NameAnzeige ? m.NameAnzeige : '').trim();

        if (nameAnzeige) return nameAnzeige;

        const teile = [];

        if (m && m.Zuname) teile.push(String(m.Zuname).trim());
        if (m && m.Vorname) teile.push(String(m.Vorname).trim());

        return teile.filter(Boolean).join(', ');
      }

      function renderMitgliederTreffer() {
        const box = document.getElementById('mitgliederTreffer');

        if (!box) return;

        if (!mitgliederCache.length) {
          box.innerHTML = '';
          return;
        }

        box.innerHTML = mitgliederCache.map(function(m, idx) {
          const meta = [
            m.Stoffbesitzernummer ? 'SB ' + m.Stoffbesitzernummer : '',
            m.Wohnort || '',
            m.Telefon || ''
          ].filter(Boolean).join(' · ');

          return '<div class="admin-result-card" onclick="mitgliedAuswaehlen(' + idx + ')">' +
            '<div><div class="admin-result-name">' + esc(mitgliedName(m)) + '</div>' +
            '<div class="admin-result-meta">' + esc(meta) + '</div></div>' +
            '<button class="admin-pink-btn" type="button" onclick="event.stopPropagation(); mitgliedAuswaehlen(' + idx + ')">Ansehen</button>' +
          '</div>';
        }).join('');
      }

      function formularLeeren(optionen) {
        const opts = optionen || {};

        Object.keys(feldMap).forEach(function(key) {
          const el = document.getElementById(feldMap[key]);
          if (el) el.value = '';
        });

        aktuelleZeile = 0;
        aktuellerModus = 'neu';
        aktuellerDriveUrl = '';

        const drive = document.getElementById('feldDriveOrdner');
        if (drive) drive.value = '';

        setText('detailStatus', '');

        if (!opts.ohneAnsichtWechsel) ansichtDetail();
      }

      function sucheLeeren() {
        const suche = document.getElementById('mitgliedSuche');
        if (suche) suche.value = '';
      }

      function neuesMitgliedVorbereiten() {
        formularLeeren();
      }

      function mitgliedAuswaehlen(index) {
        const m = mitgliederCache[index];

        if (!m) return;

        aktuelleZeile = Number(m._zeile || 0);
        aktuellerModus = 'bearbeiten';
        aktuellerDriveUrl = m.DriveOrdnerUrl || '';

        Object.keys(feldMap).forEach(function(key) {
          const el = document.getElementById(feldMap[key]);

          if (!el) return;

          if (key === 'Vereinsmitglied') {
            el.value = istVereinsmitgliedJa(m[key]) ? 'x' : '';
          } else {
            el.value = m[key] || '';
          }
        });

        const drive = document.getElementById('feldDriveOrdner');
        if (drive) drive.value = aktuellerDriveUrl || '';

        setText('detailStatus', '');
        ansichtDetail();
      }

      function zurueckZurMitgliedersuche() {
        ansichtSuche();
      }

      function istVereinsmitgliedJa(wert) {
        const v = String(wert == null ? '' : wert).trim().toLowerCase();

        return v === 'x' || v === 'ja' || v === 'j' || v === 'true' || v === '1';
      }

      function payloadAusFormular() {
        const payload = {
          _zeile: aktuelleZeile,
          _modus: aktuellerModus
        };

        Object.keys(feldMap).forEach(function(key) {
          const el = document.getElementById(feldMap[key]);

          if (!el) {
            payload[key] = '';
          } else if (key === 'Vereinsmitglied') {
            payload[key] = el.value === 'x' ? 'x' : '';
          } else {
            payload[key] = el.value.trim();
          }
        });

        return payload;
      }

      function mitgliedSpeichern() {
        if (!adminPinToken) {
          setText('detailStatus', 'PIN fehlt.');
          return;
        }

        const payload = payloadAusFormular();

        if (!payload.Zuname && !payload.Vorname && !payload.NameAnzeige) {
          setText('detailStatus', 'Name fehlt.');
          return;
        }

        setText('detailStatus', 'Speichern ...');

        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) {
              setText('detailStatus', 'Speichern nicht bestätigt.');
              return;
            }

            sucheLeeren();

            mitgliederCache = [];
            renderMitgliederTreffer();

            formularLeeren({ ohneAnsichtWechsel: true });
            ansichtSuche();

            setText('listenStatus', '');
            setText('detailStatus', '');
          })
          .withFailureHandler(function(err) {
            setText('detailStatus', err && err.message ? err.message : String(err));
          })
          .adminMitgliedSpeichern(adminPinToken, payload);
      }

      function driveOrdnerOeffnenOderAnlegen() {
        if (aktuellerDriveUrl) {
          window.open(aktuellerDriveUrl, '_blank');
          return;
        }

        if (!adminPinToken) {
          setText('detailStatus', 'PIN fehlt.');
          return;
        }

        const payload = payloadAusFormular();

        if (!payload.Zuname && !payload.Vorname && !payload.NameAnzeige) {
          setText('detailStatus', 'Name fehlt.');
          return;
        }

        setText('detailStatus', 'Ordner ...');

        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok || !res.url) {
              setText('detailStatus', 'Ordner nicht bestätigt.');
              return;
            }

            aktuellerDriveUrl = res.url;

            const drive = document.getElementById('feldDriveOrdner');
            if (drive) drive.value = res.url;

            window.open(res.url, '_blank');
            setText('detailStatus', '');
          })
          .withFailureHandler(function(err) {
            setText('detailStatus', err && err.message ? err.message : String(err));
          })
          .adminStoffbesitzerOrdnerSicherstellen(adminPinToken, payload);
      }
    </script>
  </body>
</html>
