<!DOCTYPE html>
<html>
<head>
  <base target="_self">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
      /* GitHub-Wrapper schneidet oben 80px ab, um den Google-Hinweis auszublenden.
         Dieser Ausgleich macht Überschrift und obere Buttons wieder sichtbar. */
      .main-frame {
        margin-top: 80px !important;
      }

    :root {
      --pink: #ff007f;
      --pink-dark: #800040;
      --neon: #00ff00;
      --bg-dark: #222222;
      --card-bg: #2a2a2a;
      --input-bg: #1a1a1a;
      --line: #444444;
      --text-soft: #bbbbbb;
      --neo-out: 12px 12px 24px #151515, -12px -12px 24px #333333;
      --neo-in: inset 8px 8px 16px #111111, inset -8px -8px 16px #3a3a3a;
      --danger: #8f1f1f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-dark);
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }

    body {
      padding: 8px;
      overflow-x: hidden;
    }

    .main-frame {
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      background: var(--bg-dark);
      border-radius: 24px;
      box-shadow: var(--neo-out);
      padding: 12px;
      border: 1px solid #333333;
    }

    .header-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg-dark);
      padding: 8px 0 10px;
      border-bottom: 1px solid #333333;
    }

    .title-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    #mainTitle {
      margin: 0;
      color: var(--pink);
      font-weight: 900;
      letter-spacing: 1.2px;
      text-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
      font-size: 21px;
      line-height: 1;
    }


    .top-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0;
    }

    .topbar-menu-btn,
    .top-action-btn,
    .btn-inline,
    .btn-inline-secondary,
    .modal-close,
    .modal-btn {
      border: none;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: var(--neo-out);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .topbar-menu-btn:hover,
    .top-action-btn:hover,
    .btn-inline:hover,
    .btn-inline-secondary:hover,
    .modal-close:hover,
    .modal-btn:hover {
      transform: translateY(-1px);
    }

    @keyframes zollPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 4px rgba(55,142,255,0.18), 0 0 16px rgba(55,142,255,1); }
      50% { opacity: 0.55; box-shadow: 0 0 0 7px rgba(55,142,255,0.08), 0 0 24px rgba(55,142,255,1); }
    }

    .topbar-menu-btn,
    .top-action-btn {
      min-height: 40px;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1;
    }

    .topbar-menu-btn {
      background: var(--card-bg);
      color: var(--neon);
      text-shadow: 0 0 8px rgba(0, 255, 0, 0.7);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .topbar-menu-btn.back-webapp-btn {
      min-width: 190px;
    }

    .topbar-menu-btn.current-area-btn {
      color: #ffffff;
      background: linear-gradient(145deg, #333333, #171717);
      cursor: default;
      pointer-events: none;
      text-shadow: none;
    }

    .top-action-btn {
      background: #1f1f1f;
      color: #ffffff;
      position: relative;
    }

    .top-action-btn.protocol-btn {
      min-width: 180px;
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      color: #ffffff;
      text-shadow: none;
    }

    .top-action-btn.zoll-btn {
      min-width: 118px;
      padding-left: 38px;
      background: #10233f;
      color: #ffffff;
      border: 1px solid rgba(55, 142, 255, 0.55);
      box-shadow: 0 0 0 1px rgba(55,142,255,0.16), var(--neo-out);
    }

    .top-action-btn.central-save-btn {
      min-width: 132px;
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      color: #ffffff;
      text-shadow: none;
    }

    .top-action-btn.zoll-btn::before {
      content: "🚨";
      position: absolute;
      left: 11px;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      line-height: 1;
      filter: hue-rotate(175deg) saturate(1.8);
      animation: zollPulse 1.2s ease-in-out infinite;
    }

    .header-panel {
      display: grid;
      grid-template-columns: minmax(250px, 360px) 1fr;
      gap: 10px;
      align-items: start;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: var(--neo-in);
      margin-bottom: 12px;
    }

    .header-panel label {
      color: var(--pink);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .date-picker-block {
      display: grid;
      gap: 8px;
    }

    .date-display {
      width: 100%;
      max-width: 100%;
      background: var(--input-bg);
      color: #ffffff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: var(--neo-in);
      outline: none;
      min-height: 38px;
    }

    .mini-calendar {
      display: grid;
      gap: 6px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid #3a3a3a;
    }

    .mini-calendar-head {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      gap: 6px;
      align-items: center;
    }

    .mini-calendar-month {
      text-align: center;
      color: #ffffff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .mini-calendar-nav {
      min-height: 30px;
      border: none;
      border-radius: 10px;
      background: #1f1f1f;
      color: var(--neon);
      font-weight: 900;
      cursor: pointer;
      box-shadow: var(--neo-out);
    }

    .mini-calendar-weekdays,
    .mini-calendar-days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

    .mini-calendar-weekdays span {
      text-align: center;
      color: var(--text-soft);
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .mini-calendar-day {
      min-height: 29px;
      border: 1px solid #343434;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.03);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .mini-calendar-day.empty {
      visibility: hidden;
      cursor: default;
    }

    .mini-calendar-day.planned {
      background: #00ff00;
      color: #061306;
      border-color: #b6ffb6;
      box-shadow: 0 0 10px rgba(0,255,0,0.85);
    }

    .mini-calendar-day.selected {
      outline: 4px solid #ff6a00;
      outline-offset: 2px;
      box-shadow: 0 0 0 2px rgba(255,106,0,0.55), 0 0 18px rgba(255,106,0,0.95);
    }

    .calendar-note {
      color: var(--text-soft);
      font-size: 10px;
      line-height: 1.15;
    }

    .header-panel-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-box {
      margin: 0 0 10px 0;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 12px;
      letter-spacing: 0.2px;
      box-shadow: var(--neo-in);
      display: none;
    }

    .status-box.active {
      display: block;
    }

    .status-info {
      background: #1c1c1c;
      color: #dddddd;
    }

    .status-error {
      background: #2a1118;
      color: #ffb6c9;
    }

    .container {
      display: grid;
      gap: 10px;
      padding-bottom: 18px;
    }

    .bottom-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333333;
    }

    .bottom-save-btn {
      width: min(260px, 100%);
      min-height: 46px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: var(--neo-out);
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      color: #ffffff;
    }

    .job-card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 10px;
      box-shadow: var(--neo-out);
      border: 1px solid #363636;
      display: grid;
      gap: 8px;
    }

    .summary-line {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .summary-line.primary {
      grid-template-columns: minmax(0, 1fr) auto auto;
    }

    .summary-line.secondary {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .summary-line.actions {
      grid-template-columns: minmax(110px, 1fr) auto;
      justify-content: end;
    }

    .save-group {
      display: inline-flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      justify-self: end;
      min-width: 0;
    }

    .owner-stack {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .owner-title {
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .owner-subline {
      color: var(--text-soft);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-chip,
    .done-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .status-chip {
      background: rgba(255, 0, 127, 0.14);
      color: #ffd1e6;
      border: 1px solid rgba(255, 0, 127, 0.35);
    }

    .status-chip.ok {
      background: rgba(0, 255, 0, 0.12);
      color: #c6ffc6;
      border: 1px solid rgba(0, 255, 0, 0.35);
    }

    .done-chip {
      background: rgba(0, 255, 0, 0.12);
      color: #c6ffc6;
      border: 1px solid rgba(0, 255, 0, 0.35);
    }

    .mini-field {
      min-width: 0;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 6px 8px;
      display: grid;
      gap: 3px;
    }

    .mini-field.attention {
      background: rgba(0, 150, 255, 0.34);
      border-color: rgba(0, 195, 255, 1);
      box-shadow: 0 0 0 2px rgba(0,195,255,0.38), 0 0 18px rgba(0,195,255,0.32), inset 0 0 0 1px rgba(255,255,255,0.18);
    }

    .mini-field.attention .mini-field-label {
      color: #d9f5ff;
    }

    .mini-field.attention input {
      color: #ffffff;
    }

    .mini-field.ready {
      background: rgba(0, 255, 0, 0.08);
      border-color: rgba(0, 255, 0, 0.24);
    }

    .mini-field-label {
      color: var(--text-soft);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.65px;
      text-transform: uppercase;
      line-height: 1;
    }

    .mini-field-value,
    .mini-field input {
      color: #ffffff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.1;
      width: 100%;
      min-width: 0;
    }

    .mini-field input {
      background: transparent;
      border: none;
      padding: 0;
      outline: none;
      box-shadow: none;
    }

    .mini-field input[type="number"]::-webkit-outer-spin-button,
    .mini-field input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .mini-check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 26px;
      width: auto;
      max-width: 132px;
      padding: 3px 6px;
      border-radius: 9px;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid #3a3a3a;
      color: #ffffff;
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
    }

    .mini-check input {
      width: 12px;
      height: 12px;
      accent-color: var(--neon);
      margin: 0;
      flex: 0 0 12px;
    }

    .mini-check.done-check {
      justify-self: end;
    }

    .mini-check.done-check span {
      order: 1;
    }

    .mini-check.done-check input {
      order: 2;
    }

    .btn-inline,
    .btn-inline-secondary {
      min-height: 36px;
      padding: 6px 10px;
      font-size: 11px;
      line-height: 1;
      width: 100%;
    }

    .btn-inline {
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      color: #ffffff;
    }

    .btn-inline-secondary {
      background: #1f1f1f;
      color: var(--neon);
      text-shadow: 0 0 8px rgba(0, 255, 0, 0.55);
    }

    .folder-top-btn {
      min-width: 42px;
      min-height: 32px;
      padding: 6px 10px;
      border: none;
      border-radius: 12px;
      background: #1f1f1f;
      color: var(--neon);
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: var(--neo-out);
      text-shadow: 0 0 8px rgba(0, 255, 0, 0.55);
      white-space: nowrap;
    }

    .save-action-btn {
      justify-self: end;
      width: auto;
      min-width: 116px;
    }

    .save-group .save-action-btn {
      flex: 0 0 auto;
    }

    .details-panel {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      background: #ffffff;
      color: #111111;
      border-radius: 14px;
      border: 3px solid #ffffff;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.45), 0 8px 18px rgba(0,0,0,0.22);
    }

    .details-panel.open {
      display: grid;
    }

    .detail-block {
      background: #f4f4f4;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      padding: 8px;
      min-width: 0;
    }

    .details-panel .mini-field-label {
      color: #333333;
    }

    .detail-block.wide {
      grid-column: span 3;
    }

    .detail-value {
      color: #111111;
      font-size: 12px;
      line-height: 1.2;
      word-break: break-word;
    }

    .details-toggle-arrow {
      font-size: 18px;
      line-height: 0;
      margin-right: 6px;
      vertical-align: -1px;
    }

    .zoll-line-compact {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      font-size: 12px;
      font-weight: 900;
    }

    .zoll-line-compact input {
      width: 16px;
      height: 16px;
      accent-color: var(--neon);
      margin: 0;
    }

    .print-frame {
      width: 0;
      height: 0;
      border: 0;
      position: absolute;
      left: -9999px;
      top: -9999px;
      visibility: hidden;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 99;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal-card {
      width: min(720px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: var(--neo-out);
      border: 1px solid #3b3b3b;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #3b3b3b;
    }

    .modal-title {
      font-size: 17px;
      color: var(--pink);
      font-weight: 900;
    }

    .modal-close,
    .modal-btn {
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      color: #ffffff;
      min-height: 38px;
      padding: 8px 12px;
      font-size: 12px;
    }

    .modal-body {
      padding: 14px 16px 16px;
    }

    .zoll-list {
      display: grid;
      gap: 8px;
    }

    .zoll-row {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid #3a3a3a;
      line-height: 1.35;
      font-size: 12px;
    }

    .zoll-name {
      color: #ffffff;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .zoll-meta {
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .zoll-line a,
    .zoll-summary a {
      color: var(--neon);
    }

    .zoll-summary {
      margin-top: 12px;
      display: grid;
      gap: 6px;
      font-size: 12px;
    }

    .modal-actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    @media (max-width: 900px) {
      .summary-line.secondary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-line.actions {
        grid-template-columns: minmax(88px, 1fr) auto;
      }

      .save-group {
        justify-self: end;
      }

      .details-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-block.wide {
        grid-column: span 2;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 4px;
      }

      .main-frame {
        padding: 8px;
        border-radius: 16px;
      }

      .header-top {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .title-row {
        width: 100%;
      }

      .top-actions,
      .header-panel-actions {
        justify-content: stretch;
      }

      .top-actions > *,
      .header-panel-actions > * {
        flex: 1 1 0;
      }

      .header-panel {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px;
      }

      .header-panel label {
        white-space: normal;
      }

      .summary-line.primary {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .summary-line.primary .done-chip {
        grid-column: 1 / -1;
      }

      .summary-line.secondary,
      .summary-line.actions,
      .details-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .job-card {
        padding: 8px;
        gap: 6px;
      }

      .owner-title {
        font-size: 14px;
      }

      .owner-subline,
      .mini-field-value,
      .mini-field input {
        font-size: 12px;
      }

      .mini-check,
      .btn-inline,
      .btn-inline-secondary,
      .topbar-menu-btn,
      .top-action-btn {
        min-height: 34px;
        padding: 6px 8px;
        font-size: 10px;
      }

      .detail-block.wide {
        grid-column: span 2;
      }

      .modal-head,
      .modal-body {
        padding-left: 10px;
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="main-frame">
    <div class="header-top">
      <div class="title-row">
        <h1 id="mainTitle">LEITSTAND</h1>
        <a class="topbar-menu-btn back-webapp-btn" href="<?!= (typeof istAdminRuecksprung !== 'undefined' && istAdminRuecksprung) || (typeof originModus !== 'undefined' && String(originModus).toLowerCase() === 'admin') || (typeof returnModus !== 'undefined' && String(returnModus).toLowerCase() === 'admin') ? 'https://fraumecker.github.io/brennerei-startogv/admin.html' : 'https://fraumecker.github.io/brennerei-startogv/' ?>" target="_top">ZURÜCK ZUM HAUPTMENÜ</a>
      </div>
      <div class="top-actions">
        <button class="top-action-btn protocol-btn" type="button" onclick="druckePaket()">BRENNPROTOKOLL</button>
        <button class="top-action-btn zoll-btn" type="button" onclick="openZollKontakte()">ZOLL</button>
      </div>
    </div>

    <div class="header-panel">
      <div class="date-picker-block">
        <input type="hidden" id="tagPicker" value="">
        <div class="mini-calendar" id="brandtagCalendar">
          <div class="mini-calendar-head">
            <button class="mini-calendar-nav" type="button" onclick="wechselKalenderMonat(-1)">‹</button>
            <div class="mini-calendar-month" id="calendarMonthLabel">-</div>
            <button class="mini-calendar-nav" type="button" onclick="wechselKalenderMonat(1)">›</button>
          </div>
          <div class="mini-calendar-weekdays"><span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span></div>
          <div class="mini-calendar-days" id="calendarDays"></div>
          <div class="calendar-note">Neon grün = geplanter Brenntag. Daten werden erst nach Klick auf einen grünen Tag geladen.</div>
        </div>
      </div>
      <div class="header-panel-actions" aria-hidden="true"></div>
    </div>

    <div id="statusBox" class="status-box"></div>
    <iframe id="printFrame" class="print-frame" title="Brennprotokoll-Druck"></iframe>

    <div class="container" id="jobList">
      
    </div>

    <div class="bottom-actions">
      <button class="bottom-save-btn" type="button" onclick="saveAllCards(this)">SPEICHERN</button>
    </div>
  </div>

  <div class="modal-backdrop" id="zollModal" onclick="handleModalBackdropClick(event)">
    <div class="modal-card">
      <div class="modal-head">
        <div id="zollModalTitle" class="modal-title">Zoll-Kontaktliste</div>
        <button class="modal-close" type="button" onclick="closeZollModal()">SCHLIESSEN</button>
      </div>
      <div class="modal-body">
        <div id="zollModalNote" style="margin-bottom:10px; color:#bbbbbb;"></div>
        <div class="zoll-list" id="zollListe"></div>
        <div class="zoll-summary" id="zollZusatz"></div>
        <div class="modal-actions">
          <button class="modal-btn" type="button" onclick="closeZollModal()">SCHLIESSEN</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const webAppUrl = <?= JSON.stringify(webAppUrl || '') ?>;
  const GITHUB_INDEX_URL = 'https://fraumecker.github.io/brennerei-startogv/';
  const GITHUB_ADMIN_URL = 'https://fraumecker.github.io/brennerei-startogv/admin.html';
  const returnModus = <?= JSON.stringify(typeof returnModus !== 'undefined' ? returnModus : '') ?>;
  const originModus = <?= JSON.stringify(typeof originModus !== 'undefined' ? originModus : '') ?>;
  const istAdminRuecksprung = <?= (typeof istAdminRuecksprung !== 'undefined' && istAdminRuecksprung) ? 'true' : 'false' ?>;
  let geplanteBrandtage = [];
  let kalenderDatum = new Date();

  window.onload = function() {
    ladeGeplanteBrandtage();
  };

  function ladeGeplanteBrandtage() {
    google.script.run
      .withSuccessHandler(function(daten) {
        geplanteBrandtage = Array.isArray(daten) ? daten.map(String) : [];
        setzeKalenderAufNaechstenGeplantenMonatOhneAuswahl();
        zeichneKalender();
        document.getElementById('jobList').innerHTML = '';
      })
      .withFailureHandler(function() {
        geplanteBrandtage = [];
        setzeKalenderAufHeuteOhneAuswahl();
        zeichneKalender();
        document.getElementById('jobList').innerHTML = '';
      })
      .getLeitstandGeplanteBrandtage();
  }

  function setzeKalenderAufNaechstenGeplantenMonatOhneAuswahl() {
    const heuteIso = isoVonDatum_(new Date());
    let zielIso = '';

    for (let i = 0; i < geplanteBrandtage.length; i++) {
      if (String(geplanteBrandtage[i]) >= heuteIso) {
        zielIso = String(geplanteBrandtage[i]);
        break;
      }
    }

    if (!zielIso && geplanteBrandtage.length) {
      zielIso = String(geplanteBrandtage[geplanteBrandtage.length - 1]);
    }

    document.getElementById('tagPicker').value = '';

    if (zielIso) {
      const teile = zielIso.split('-');
      kalenderDatum = new Date(Number(teile[0]), Number(teile[1]) - 1, 1);
    } else {
      setzeKalenderAufHeuteOhneAuswahl();
    }
  }

  function setzeKalenderAufHeuteOhneAuswahl() {
    const heute = new Date();
    document.getElementById('tagPicker').value = '';
    kalenderDatum = new Date(heute.getFullYear(), heute.getMonth(), 1);
  }

  function isoVonDatum_(datum) {
    return datum.getFullYear() + '-' + String(datum.getMonth() + 1).padStart(2, '0') + '-' + String(datum.getDate()).padStart(2, '0');
  }

  function handleDateInputChange() {
    const datum = document.getElementById('tagPicker').value;
    if (datum) {
      const teile = datum.split('-');
      if (teile.length === 3) {
        kalenderDatum = new Date(Number(teile[0]), Number(teile[1]) - 1, 1);
      }
    }
    zeichneKalender();
    fetchJobs();
  }

  function wechselKalenderMonat(delta) {
    kalenderDatum = new Date(kalenderDatum.getFullYear(), kalenderDatum.getMonth() + delta, 1);
    zeichneKalender();
  }

  function zeichneKalender() {
    const label = document.getElementById('calendarMonthLabel');
    const ziel = document.getElementById('calendarDays');
    if (!label || !ziel) return;

    const jahr = kalenderDatum.getFullYear();
    const monat = kalenderDatum.getMonth();
    const ausgewaehlt = document.getElementById('tagPicker').value;
    const monate = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    label.textContent = monate[monat] + ' ' + jahr;
    ziel.innerHTML = '';

    const erster = new Date(jahr, monat, 1);
    const letzterTag = new Date(jahr, monat + 1, 0).getDate();
    const startOffset = (erster.getDay() + 6) % 7;

    for (let i = 0; i < startOffset; i++) {
      const leer = document.createElement('button');
      leer.type = 'button';
      leer.className = 'mini-calendar-day empty';
      leer.tabIndex = -1;
      ziel.appendChild(leer);
    }

    for (let tag = 1; tag <= letzterTag; tag++) {
      const iso = jahr + '-' + String(monat + 1).padStart(2, '0') + '-' + String(tag).padStart(2, '0');
      const btn = document.createElement('button');
      btn.type = 'button';
      const istGeplant = geplanteBrandtage.indexOf(iso) !== -1;
      btn.className = 'mini-calendar-day'
        + (istGeplant ? ' planned' : '')
        + (iso === ausgewaehlt ? ' selected' : '');
      btn.textContent = String(tag);
      btn.onclick = function() {
        if (!istGeplant) {
          document.getElementById('tagPicker').value = '';
          document.getElementById('jobList').innerHTML = '';
          zeichneKalender();
          return;
        }
        document.getElementById('tagPicker').value = iso;
        fetchJobs();
        zeichneKalender();
      };
      ziel.appendChild(btn);
    }
  }

  function fetchJobs() {
    const datum = document.getElementById('tagPicker').value;
    if (!datum || geplanteBrandtage.indexOf(String(datum)) === -1) {
      document.getElementById('jobList').innerHTML = '';
      return;
    }
    google.script.run
      .withSuccessHandler(drawJobs)
      .withFailureHandler(showServerError)
      .getLeitstandData(datum);
  }

  function zurueckZurWebApp() {
    const istAdmin =
      istAdminRuecksprung === true ||
      String(originModus || '').toLowerCase() === 'admin' ||
      String(returnModus || '').toLowerCase() === 'admin';

    const ziel = istAdmin ? GITHUB_ADMIN_URL : GITHUB_INDEX_URL;

    try {
      window.top.location.href = ziel;
    } catch (e1) {
      try {
        window.parent.location.href = ziel;
      } catch (e2) {
        window.location.href = ziel;
      }
    }
  }

  function drawJobs(res) {
    const cont = document.getElementById('jobList');
    cont.innerHTML = '';

    if (!res || !res.jobs || res.jobs.length === 0) {
      cont.innerHTML = '';
      return;
    }

    res.jobs.forEach(function(j) {
      const card = document.createElement('div');
      card.className = 'job-card';
      card.dataset.row = String(Number(j.row) || 0);
      card.dataset.vid = String(j.vId || '');
      const minderausbeuteChecked = j.istMinderausbeute ? 'checked' : '';
      const doneChip = j.istErledigt ? '<div class="done-chip">ERLEDIGT</div>' : '';
      const detailId = 'detail-' + escapeAttr_(String(j.vId || j.row || Math.random()).replace(/[^a-zA-Z0-9_-]/g, ''));
      const alkValue = String(j.alk || '').trim();
      const ausbeuteValue = String(j.ausbeute || '').trim();
      const alkFieldClass = alkValue ? 'mini-field ready' : 'mini-field attention';
      const ausbeuteFieldClass = ausbeuteValue ? 'mini-field ready' : 'mini-field attention';

      card.innerHTML = `
        <div class="summary-line primary">
          <div class="owner-stack">
            <div class="owner-title">${escapeHtml_(j.owner || '-')}</div>
            <div class="owner-subline">${escapeHtml_(j.brenner || 'Aktiv')} · Reg.-Nr. ${escapeHtml_(j.regNr || '-')} · Material: ${escapeHtml_(j.material || '-')} · Fass: ${escapeHtml_(j.fassNr || '-')} · Inhalt: ${escapeHtml_(formatLiter_(j.inhalt))}</div>
          </div>
          <button class="folder-top-btn" type="button" title="Ordner öffnen" aria-label="Ordner öffnen" onclick="openLinkSafe('${escapeJs_(j.link || '')}')">📁</button>
          ${doneChip || '<div></div>'}
        </div>

        <div class="summary-line secondary">
          <div class="mini-field">
            <div class="mini-field-label">Von</div>
            <div class="mini-field-value">${escapeHtml_(j.von || '-')}</div>
          </div>
          <div class="mini-field">
            <div class="mini-field-label">Bis</div>
            <div class="mini-field-value">${escapeHtml_(j.bis || '-')}</div>
          </div>
          <div class="${alkFieldClass}">
            <div class="mini-field-label">Alkohol</div>
            <input type="number" step="0.01" value="${escapeAttr_(j.alk || '')}" data-role="alkohol" placeholder="ausfüllen">
          </div>
          <div class="${ausbeuteFieldClass}">
            <div class="mini-field-label">Liter</div>
            <input type="number" step="0.01" value="${escapeAttr_(j.ausbeute || '')}" data-role="ausbeute" placeholder="ausfüllen">
          </div>
        </div>

        <div class="summary-line actions">
          <button class="btn-inline-secondary" type="button" onclick="toggleDetails('${detailId}', this)"><span class="details-toggle-arrow">▼</span>DETAILS</button>
          <div class="save-group">
            <label class="mini-check"><input type="checkbox" ${minderausbeuteChecked} data-role="minderausbeute"><span>Minderausbeute</span></label>
          </div>
        </div>

        <div class="details-panel" id="${detailId}">
          <div class="detail-block">
            <div class="mini-field-label">Material</div>
            <div class="detail-value">${escapeHtml_(j.material || '-')}</div>
          </div>
          <div class="detail-block">
            <div class="mini-field-label">Fassnummer</div>
            <div class="detail-value">${escapeHtml_(j.fassNr || '-')}</div>
          </div>
          <div class="detail-block">
            <div class="mini-field-label">Inhalt in Liter</div>
            <div class="detail-value">${escapeHtml_(formatLiter_(j.inhalt))}</div>
          </div>
          <div class="detail-block">
            <div class="mini-field-label">Faßgröße</div>
            <div class="detail-value">${escapeHtml_(j.fassgroesse || '-')}</div>
          </div>
          <div class="detail-block wide">
            <div class="mini-field-label">Gewürze</div>
            <div class="detail-value">${escapeHtml_(j.gewuerze || '-')}</div>
          </div>
        </div>
      `;
      cont.appendChild(card);
    });
  }


  function toggleDetails(detailId, button) {
    const panel = document.getElementById(detailId);
    if (!panel) {
      showStatus('Details konnten nicht geöffnet werden: Detailbereich nicht gefunden.', 'error');
      return;
    }

    const wirdGeoeffnet = !panel.classList.contains('open');
    panel.classList.toggle('open', wirdGeoeffnet);

    if (button) {
      button.setAttribute('aria-expanded', wirdGeoeffnet ? 'true' : 'false');
      const arrow = button.querySelector('.details-toggle-arrow');
      if (arrow) {
        arrow.textContent = wirdGeoeffnet ? '▲' : '▼';
      }
    }
  }

  function lesePayloadAusKarte(card) {
    return {
      row: Number(card && card.dataset ? card.dataset.row : 0) || 0,
      vId: card && card.dataset ? String(card.dataset.vid || '') : '',
      alkohol: leseFeldwert(card, 'alkohol'),
      ausbeute: leseFeldwert(card, 'ausbeute'),
      erledigt: true,
      minderausbeute: leseCheckbox(card, 'minderausbeute')
    };
  }

  function saveAllCards(button) {
    const cards = Array.prototype.slice.call(document.querySelectorAll('.job-card'));

    if (!cards.length) {
      showStatus('Keine Vorgänge zum Speichern vorhanden.', 'error');
      return;
    }

    const payloads = cards.map(lesePayloadAusKarte).filter(function(payload) {
      return payload.row || payload.vId;
    });

    if (!payloads.length) {
      showStatus('Speichern nicht möglich: keine gültigen Vorgänge gefunden.', 'error');
      return;
    }

    setBusy(true, button, 'Speichere ...');

    let index = 0;

    function naechstenSpeichern() {
      if (index >= payloads.length) {
        setBusy(false, button);
        showStatus('Alle Vorgänge gespeichert.', 'info');
        fetchJobs();
        return;
      }

      google.script.run
        .withSuccessHandler(function() {
          index += 1;
          naechstenSpeichern();
        })
        .withFailureHandler(function(err) {
          setBusy(false, button);
          const msg = err && err.message ? err.message : String(err || 'Unbekannter Fehler');
          showStatus('Speichern nicht möglich: ' + msg, 'error');
        })
        .saveLeitstandEintrag(payloads[index]);
    }

    naechstenSpeichern();
  }

  function openLinkSafe(url) {
    if (!url) return;
    window.open(url, '_blank');
  }

  let zollKontaktPayload = null;

  function openZollKontakte() {
    google.script.run
      .withSuccessHandler(showZollKontaktModal)
      .withFailureHandler(showServerError)
      .getZollNotfallKontaktliste();
  }

  function showZollKontaktModal(payload) {
    zollKontaktPayload = payload || null;

    if (!payload || !Array.isArray(payload.kontakte)) {
      showStatus('Zoll-Kontaktliste konnte nicht geladen werden.', 'error');
      return;
    }

    document.getElementById('zollModalTitle').textContent = payload.titel || 'Zoll-Kontaktliste';
    document.getElementById('zollModalNote').textContent = payload.untertitel || 'Nur Anzeige der hinterlegten Zoll-Liste.';
    document.getElementById('zollListe').innerHTML = payload.kontakte.map(function(k) {
      return '<div class="zoll-row">'
        + '<div class="zoll-name">👤 ' + escapeHtml(k.name || '') + '</div>'
        + '<div class="zoll-meta">🏢 ' + escapeHtml(k.dienstsitz || '-') + '</div>'
        + '<div class="zoll-line">📞 Telefon: ' + linkHtml(k.telefon, 'tel') + '</div>'
        + '<div class="zoll-line">📱 Mobil: ' + linkHtml(k.mobil, 'tel') + '</div>'
        + '<div class="zoll-line">✉️ E-Mail: ' + linkHtml(k.email, 'mail') + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('zollZusatz').innerHTML = ''
      + '<div class="zoll-summary-item"><strong>Stand:</strong> ' + escapeHtml(payload.stand || '-') + '</div>'
      + '<div class="zoll-summary-item"><strong>Fax alle Standorte:</strong> ' + escapeHtml(payload.faxAlleStandorte || '-') + '</div>'
      + '<div class="zoll-summary-item"><strong>Zentrale E-Mail:</strong> ' + linkHtml(payload.zentraleEmail || '-', 'mail') + '</div>';
    document.getElementById('zollModal').classList.add('active');
  }

  function closeZollModal() {
    document.getElementById('zollModal').classList.remove('active');
  }

  function leseFeldwert(card, role) {
    const feld = card.querySelector('[data-role="' + role + '"]');
    return feld ? feld.value : '';
  }

  function leseCheckbox(card, role) {
    const feld = card.querySelector('[data-role="' + role + '"]');
    return !!(feld && feld.checked);
  }

  function istZollGenehmigt(text) {
    return String(text || '').toUpperCase().indexOf('GENEHMIGT') !== -1 || String(text || '').toUpperCase().indexOf('ZOLL_OK') !== -1;
  }

  function linkHtml(wert, typ) {
    const text = String(wert || '').trim();
    if (!text || text === '-') return '-';

    if (typ === 'mail') {
      return '<a href="mailto:' + escapeAttr_(text) + '">' + escapeHtml_(text) + '</a>';
    }

    const tel = text.replace(/[^\d+]/g, '');
    if (!tel) return escapeHtml_(text);
    return '<a href="tel:' + escapeAttr_(tel) + '">' + escapeHtml_(text) + '</a>';
  }

  function handleModalBackdropClick(event) {
    if (event.target && event.target.id === 'zollModal') {
      closeZollModal();
    }
  }

  function formatLiter_(wert) {
    const text = String(wert || '').trim();
    if (!text) return '-';
    return /liter|litre| l$/i.test(text) ? text : text + ' Liter';
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeHtml_(text) {
    return escapeHtml(text);
  }

  function escapeAttr_(text) {
    return escapeHtml(text);
  }

  function escapeJs_(text) {
    return String(text || '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\r/g, '')
      .replace(/\n/g, ' ')
      .replace(/</g, '\\x3C')
      .replace(/>/g, '\\x3E');
  }

  function showServerError(err) {
    const msg = err && err.message ? err.message : String(err || 'Unbekannter Fehler');
    showStatus(msg, 'error');
  }

  function showStatus(message, type) {
    const box = document.getElementById('statusBox');
    if (!box) return;
    box.textContent = message || '';
    box.className = 'status-box active ' + (type === 'error' ? 'status-error' : 'status-info');
  }

  function setBusy(isBusy, button, busyText) {
    if (!button) return;
    if (isBusy) {
      button.disabled = true;
      button.dataset.originalText = button.textContent;
      button.textContent = busyText || 'Bitte warten ...';
    } else {
      button.disabled = false;
      button.textContent = button.dataset.originalText || button.textContent;
    }
  }
</script>
</body>
</html>
